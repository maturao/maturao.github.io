<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        body {
            background-color: black;
        }

        * {
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100vw;
            height: 100vh;
        }

        #someVideo,
        #someImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>

    <script>
        window.addEventListener("load", () => {
            const videoElement = document.querySelector("#someVideo");
            const imageElement = document.querySelector("#someImage");

            const currentUrl = new URL(location.href)
            const imageurl = currentUrl.searchParams.get("i");

            if (imageurl != null) {
                imageElement.src = currentUrl.searchParams.get("i");
                imageElement.hidden = false;
            }


            document.addEventListener("mousedown", () => {
                imageElement.hidden = true;
                videoElement.hidden = false;
                videoElement.play();
            })
        });
    </script>
</head>

<body>

    <div class="container">

        <image id="someImage" hidden> </image>

        <video id="someVideo" hidden loop src="https://bit.ly/3eQt21y">
        </video>
    </div>
</body>

</html>
